<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Synthèses</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ─── Variables ────────────────────────────────────────────── */
    :root {
      --bg:        #f0f4ff;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --text:      #1e293b;
      --muted:     #64748b;
      --accent:    #6366f1;
      --accent-dk: #4f46e5;
      --success:   #10b981;
      --error:     #ef4444;
      --math:      #3b82f6;
      --fr:        #ec4899;
      --eveil:     #10b981;
      --radius:    16px;
      --shadow:    0 4px 24px rgba(99,102,241,.10);
    }

    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ─── Header ───────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }

    .header-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .header-sub {
      font-size: .9rem;
      color: var(--muted);
      margin-top: 4px;
      font-style: italic;
      font-family: 'Lora', serif;
    }

    /* ─── Tabs ─────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 28px 16px 0;
      flex-wrap: wrap;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 50px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: all .25s;
    }

    .tab-btn:hover { border-color: var(--accent); color: var(--accent); }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(99,102,241,.35);
    }

    /* ─── Sections ─────────────────────────────────────────────── */
    .section { display: none; animation: fadeUp .35s ease; }
    .section.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Formulaire ────────────────────────────────────────────── */
    .form-wrap {
      max-width: 680px;
      margin: 32px auto 0;
      padding: 0 16px;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
      box-shadow: var(--shadow);
    }

    .form-card h2 {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-card h2 .icon {
      width: 36px; height: 36px;
      background: #ede9fe;
      color: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }

    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: .82rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 7px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: .95rem;
      color: var(--text);
      background: #fafbff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }

    .field textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr 80px;
      gap: 14px;
    }

    @media (max-width: 520px) {
      .field-row { grid-template-columns: 1fr; }
      .form-card { padding: 24px 20px; }
    }

    /* ─── Bouton principal ──────────────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(99,102,241,.30);
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--accent-dk);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,.40);
    }

    .btn-submit:disabled { opacity: .65; cursor: not-allowed; transform: none; }

    /* ─── Toast de confirmation ─────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 14px 24px;
      border-radius: 50px;
      font-weight: 700;
      font-size: .9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 999;
      opacity: 0;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.success { background: var(--success); }
    #toast.error   { background: var(--error); }

    /* ─── Grille des fiches ─────────────────────────────────────── */
    .grid-wrap {
      max-width: 1100px;
      margin: 32px auto 0;
      padding: 0 16px;
    }

    .grid-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-pill {
      padding: 8px 18px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
    }

    .filter-pill:hover { border-color: var(--accent); color: var(--accent); }
    .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-pill.math   { --accent: var(--math); }
    .filter-pill.fr     { --accent: var(--fr); }
    .filter-pill.eveil  { --accent: var(--eveil); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ─── Cartes ────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,.10);
    }

    .card-stripe {
      height: 5px;
    }

    .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .card-author {
      font-weight: 800;
      font-size: .95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .badge {
      font-size: .72rem;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 50px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 800;
      margin-bottom: 6px;
      font-family: 'Lora', serif;
      line-height: 1.35;
    }

    .card-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .card-texte {
      font-size: .88rem;
      line-height: 1.7;
      color: #475569;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      white-space: pre-wrap;
      flex-grow: 1;
      font-family: 'Lora', serif;
    }

    /* ─── Couleurs par domaine ──────────────────────────────────── */
    .c-math   { background: var(--math); }
    .c-fr     { background: var(--fr); }
    .c-eveil  { background: var(--eveil); }
    .c-gen    { background: var(--accent); }

    .b-math  { background: #dbeafe; color: #1d4ed8; }
    .b-fr    { background: #fce7f3; color: #be185d; }
    .b-eveil { background: #d1fae5; color: #065f46; }
    .b-gen   { background: #ede9fe; color: #5b21b6; }

    /* ─── États (loader, vide, erreur) ─────────────────────────── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
    }

    .state-box i { font-size: 2.5rem; margin-bottom: 16px; display: block; }
    .state-box p { font-size: 1rem; font-weight: 600; }

    .loader-ring {
      width: 44px; height: 44px;
      border: 4px solid #e2e8f0;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────────── -->
  <header>
    <div class="header-title">
      <i class="fa-solid fa-book-sparkles"></i>
      Mes Synthèses
    </div>
    <p class="header-sub">Écris et consulte les résumés de tes leçons</p>

    <div class="tabs">
      <button class="tab-btn active" id="btn-ecrire" onclick="switchTab('ecrire')">
        <i class="fa-solid fa-pen-nib"></i> Écrire
      </button>
      <button class="tab-btn" id="btn-voir" onclick="switchTab('voir')">
        <i class="fa-solid fa-book-open"></i> Voir les fiches
      </button>
    </div>
  </header>

  <!-- ─── Onglet : ÉCRIRE ──────────────────────────────────────── -->
  <section id="ecrire" class="section active">
    <div class="form-wrap">
      <div class="form-card">
        <h2>
          <span class="icon"><i class="fa-solid fa-plus"></i></span>
          Nouvelle synthèse
        </h2>

        <!-- Prénom -->
        <div class="field">
          <label for="prenom">Ton prénom</label>
          <input type="text" id="prenom" placeholder="Ex : Lucas, Emma…" autocomplete="given-name">
        </div>

        <!-- Domaine / Champ / Numéro -->
        <div class="field-row">
          <div class="field" style="margin-bottom:0">
            <label for="domaine">Domaine</label>
            <select id="domaine" onchange="refreshChamps()">
              <option value="Mathématiques">Mathématiques</option>
              <option value="Français">Français</option>
              <option value="Éveil">Éveil</option>
            </select>
          </div>
          <div class="field" style="margin-bottom:0">
            <label for="champ">Champ d'étude</label>
            <select id="champ"></select>
          </div>
          <div class="field" style="margin-bottom:0">
            <label for="numero">N°</label>
            <input type="number" id="numero" min="1" value="1" style="text-align:center">
          </div>
        </div>

        <!-- Titre -->
        <div class="field" style="margin-top:20px">
          <label for="titre">Titre de la leçon</label>
          <input type="text" id="titre" placeholder="Ex : Le passé composé, Les fractions…">
        </div>

        <!-- Texte -->
        <div class="field">
          <label for="texte">Ma synthèse</label>
          <textarea id="texte" placeholder="Rédige ici ce que tu as retenu…"></textarea>
        </div>

        <!-- Bouton -->
        <button class="btn-submit" id="btnEnvoyer" onclick="envoyerSynthese()">
          <i class="fa-solid fa-paper-plane"></i> Enregistrer
        </button>
      </div>
    </div>
  </section>

  <!-- ─── Onglet : VOIR ────────────────────────────────────────── -->
  <section id="voir" class="section">
    <div class="grid-wrap">

      <!-- Filtres -->
      <div class="grid-controls">
        <button class="filter-pill active" onclick="filtrer('tous', this)">Toutes</button>
        <button class="filter-pill math"  onclick="filtrer('Mathématiques', this)">Maths</button>
        <button class="filter-pill fr"    onclick="filtrer('Français', this)">Français</button>
        <button class="filter-pill eveil" onclick="filtrer('Éveil', this)">Éveil</button>
      </div>

      <!-- Grille -->
      <div id="grille" class="grid"></div>

      <!-- États -->
      <div id="etat" class="state-box" style="display:none"></div>

    </div>
  </section>

  <!-- ─── Toast ───────────────────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ─── Script ──────────────────────────────────────────────── -->
  <script>
    // ── CONFIG ────────────────────────────────────────────────────
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgoypPI8k8CrFy1IBk2kRmsjinUsRXS60Pg_hEpKIikDnOQIgC_H7PigOt1S3ctvqnpg/exec";

    const CHAMPS = {
      "Mathématiques": ["Arithmétique à l'Algèbre", "Espace et Géométrie", "Grandeurs et relations", "Organisation des données et statistique"],
      "Français":      ["Grammaire", "Conjugaison", "Outil de la langue"],
      "Éveil":         ["Sciences", "Histoire", "Géographie"]
    };

    // Toutes les fiches chargées (pour le filtre local)
    let toutesLesFiches = [];
    let filtreCourant   = "tous";

    // ── INIT ──────────────────────────────────────────────────────
    refreshChamps();

    // ── ONGLETS ───────────────────────────────────────────────────
    function switchTab(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.getElementById('btn-' + id).classList.add('active');
      if (id === 'voir') chargerSyntheses();
    }

    // ── CHAMPS DYNAMIQUES ─────────────────────────────────────────
    function refreshChamps() {
      const domaine = document.getElementById("domaine").value;
      const sel     = document.getElementById("champ");
      sel.innerHTML = CHAMPS[domaine]
        .map(c => `<option value="${c}">${c}</option>`)
        .join("");
    }

    // ── ENVOI (via GET avec action=post) ──────────────────────────
    async function envoyerSynthese() {
      const btn = document.getElementById("btnEnvoyer");

      const data = {
        prenom:  document.getElementById("prenom").value.trim(),
        domaine: document.getElementById("domaine").value,
        champ:   document.getElementById("champ").value,
        numero:  document.getElementById("numero").value || "1",
        titre:   document.getElementById("titre").value.trim(),
        texte:   document.getElementById("texte").value.trim()
      };

      // Validation côté client
      if (!data.prenom) { showToast("Indique ton prénom !", "error"); return; }
      if (!data.texte)  { showToast("La synthèse est vide !", "error"); return; }

      // Feedback visuel
      btn.disabled     = true;
      btn.innerHTML    = '<i class="fa-solid fa-spinner fa-spin"></i> Envoi…';

      try {
        // ✅ On passe par GET + URLSearchParams → pas de no-cors, réponse lisible
        const params = new URLSearchParams({ action: "post", ...data });
        const resp   = await fetch(SCRIPT_URL + "?" + params.toString());

        if (!resp.ok) throw new Error("HTTP " + resp.status);

        const result = await resp.json();

        if (result.result === "success") {
          // Reset formulaire
          document.getElementById("titre").value = "";
          document.getElementById("texte").value = "";
          showToast("✅ Synthèse enregistrée !", "success");
          // Bascule vers "voir" après un bref instant
          setTimeout(() => switchTab('voir'), 900);
        } else {
          throw new Error(result.message || "Erreur inconnue");
        }

      } catch (err) {
        console.error(err);
        showToast("Erreur : " + err.message, "error");
      } finally {
        btn.disabled  = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enregistrer';
      }
    }

    // ── CHARGEMENT ────────────────────────────────────────────────
    async function chargerSyntheses() {
      afficherEtat("loading");

      try {
        const resp = await fetch(SCRIPT_URL + "?t=" + Date.now());
        if (!resp.ok) throw new Error("HTTP " + resp.status);

        const data = await resp.json();

        // Détection d'une erreur Apps Script
        if (!Array.isArray(data)) throw new Error(data.message || "Réponse inattendue");

        toutesLesFiches = data.reverse(); // plus récent en premier
        afficherFiches(toutesLesFiches);

      } catch (err) {
        console.error(err);
        afficherEtat("error", err.message);
      }
    }

    // ── FILTRE LOCAL (pas de nouveau fetch) ───────────────────────
    function filtrer(domaine, btn) {
      filtreCourant = domaine;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');

      const filtrees = domaine === "tous"
        ? toutesLesFiches
        : toutesLesFiches.filter(f => f.domaine === domaine);

      afficherFiches(filtrees);
    }

    // ── RENDU DES CARTES ──────────────────────────────────────────
    function afficherFiches(fiches) {
      const grille = document.getElementById("grille");
      const etat   = document.getElementById("etat");
      grille.innerHTML = "";

      if (fiches.length === 0) {
        afficherEtat("vide");
        return;
      }

      etat.style.display = "none";

      fiches.forEach(f => {
        const prenom  = f.prenom  || "Élève";
        const domaine = f.domaine || "Général";
        const champ   = f.champ   || "";
        const numero  = f.numero  || "1";
        const titre   = f.titre   || "Leçon sans titre";
        const texte   = f.texte   || "";

        // Couleurs selon domaine
        let stripe = "c-gen",  badge = "b-gen";
        if (domaine === "Mathématiques") { stripe = "c-math";  badge = "b-math"; }
        if (domaine === "Français")      { stripe = "c-fr";    badge = "b-fr";   }
        if (domaine === "Éveil")         { stripe = "c-eveil"; badge = "b-eveil";}

        // Initiale pour l'avatar
        const initiale = prenom.charAt(0).toUpperCase();

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-stripe ${stripe}"></div>
          <div class="card-body">
            <div class="card-top">
              <span class="card-author">
                <span class="avatar ${stripe}">${initiale}</span>
                ${escHtml(prenom)}
              </span>
              <span class="badge ${badge}">${escHtml(domaine)}</span>
            </div>
            <div class="card-title">${escHtml(titre)}</div>
            <div class="card-meta">
              <i class="fa-solid fa-tag" style="font-size:.7rem"></i>
              ${escHtml(champ)} · N°${escHtml(String(numero))}
            </div>
            <div class="card-texte">${escHtml(texte)}</div>
          </div>
        `;
        grille.appendChild(card);
      });
    }

    // ── ÉTATS UI ──────────────────────────────────────────────────
    function afficherEtat(type, msg) {
      const grille = document.getElementById("grille");
      const etat   = document.getElementById("etat");
      grille.innerHTML    = "";
      etat.style.display  = "block";

      if (type === "loading") {
        etat.innerHTML = `<div class="loader-ring"></div><p>Chargement des fiches…</p>`;
      } else if (type === "vide") {
        etat.innerHTML = `<i class="fa-solid fa-folder-open"></i><p>Aucune synthèse pour l'instant.<br>Sois le premier à en écrire une !</p>`;
      } else {
        etat.innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="color:var(--error)"></i><p>Impossible de charger les fiches.<br><small style="font-weight:400;color:var(--muted)">${escHtml(msg || "")}</small></p>`;
      }
    }

    // ── TOAST ─────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = "") {
      const t = document.getElementById("toast");
      t.textContent  = msg;
      t.className    = "show " + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.className = "", 3200);
    }

    // ── SÉCURITÉ : échappe le HTML ─────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
