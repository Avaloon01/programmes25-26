<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulletin P4 — FWB</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f2ee;
  --surface: #ffffff;
  --ink: #1a1814;
  --ink2: #6b6660;
  --ink3: #a8a39e;
  --accent: #2d5a3d;
  --accent2: #4a8c61;
  --gold: #c8973a;
  --red: #8b3a3a;
  --amber: #9a6e1a;
  --green: #2d5a3d;
  --border: #e0ddd6;
  --radius: 12px;
  --shadow: 0 2px 16px rgba(26,24,20,0.08);
  --shadow-lg: 0 8px 40px rgba(26,24,20,0.14);
  --domaine-1: #2d5a3d;
  --domaine-2: #3a4a6b;
  --domaine-3: #6b3a2d;
  --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── LAYOUT ── */
.app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--ink);
  color: #f4f2ee;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.sidebar-header {
  padding: 28px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
  color: #f4f2ee;
}

.sidebar-sub {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(244,242,238,0.45);
  font-weight: 500;
}

.sidebar-label {
  padding: 18px 20px 8px;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(244,242,238,0.35);
  font-weight: 600;
}

.eleve-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  cursor: pointer;
  border: none;
  background: none;
  color: rgba(244,242,238,0.7);
  width: 100%;
  text-align: left;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  transition: all var(--transition);
  border-radius: 0;
}

.eleve-btn:hover {
  background: rgba(255,255,255,0.07);
  color: #f4f2ee;
}

.eleve-btn.active {
  background: rgba(255,255,255,0.12);
  color: #f4f2ee;
  font-weight: 500;
}

.eleve-btn.active .eleve-dot { background: var(--gold); }

.eleve-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  flex-shrink: 0;
  transition: background var(--transition);
}

.eleve-progress-mini {
  margin-left: auto;
  font-size: 11px;
  color: rgba(244,242,238,0.4);
  font-variant-numeric: tabular-nums;
}

/* ── MAIN ── */
.main {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-name {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--ink);
  flex: 1;
}

.topbar-score {
  font-size: 13px;
  color: var(--ink2);
  background: var(--bg);
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}

.topbar-score strong { color: var(--accent); }

.filter-pills { display: flex; gap: 6px; }

.pill {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  cursor: pointer;
  transition: all var(--transition);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
}

.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active { background: var(--ink); color: #f4f2ee; border-color: var(--ink); }

.btn-export {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all var(--transition);
  font-weight: 500;
}

.btn-export:hover { background: var(--ink); color: #f4f2ee; border-color: var(--ink); }

/* ── CONTENT ── */
.content { padding: 28px 32px; flex: 1; }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 60vh;
  text-align: center; color: var(--ink3);
}

.empty-state svg { margin-bottom: 16px; opacity: 0.3; }
.empty-state h3 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink2); margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* ── LOADING ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 60vh; flex-direction: column; gap: 16px; color: var(--ink3);
}

.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── DOMAINE BLOCK ── */
.domaine-block { margin-bottom: 28px; }

.domaine-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-radius: var(--radius) var(--radius) 0 0;
  cursor: pointer;
  user-select: none;
  color: #fff;
  transition: filter var(--transition);
}

.domaine-header:hover { filter: brightness(1.08); }

.domaine-header.d0 { background: var(--domaine-1); }
.domaine-header.d1 { background: var(--domaine-2); }
.domaine-header.d2 { background: var(--domaine-3); }

.domaine-title {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  letter-spacing: -0.2px;
  flex: 1;
}

.domaine-stats {
  font-size: 12px;
  opacity: 0.75;
  font-variant-numeric: tabular-nums;
}

.domaine-chevron {
  font-size: 11px;
  opacity: 0.6;
  transition: transform var(--transition);
}

.domaine-chevron.open { transform: rotate(90deg); }

.domaine-body {
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
  background: var(--surface);
}

/* ── CHAMP ── */
.champ-block { border-top: 1px solid var(--border); }
.champ-block:first-child { border-top: none; }

.champ-header {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 18px;
  background: #faf9f7;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}

.champ-header:hover { background: #f2f0eb; }

.champ-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
  letter-spacing: -0.1px;
}

.champ-stats { font-size: 11px; color: var(--ink3); }

.champ-chevron {
  font-size: 10px;
  color: var(--ink3);
  transition: transform var(--transition);
}

.champ-chevron.open { transform: rotate(90deg); }

/* ── ATTENDUS TABLE ── */
.attendus-table {
  width: 100%;
  border-collapse: collapse;
}

.attendus-table th {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink3);
  padding: 8px 18px;
  text-align: left;
  background: #fdfcfb;
  border-bottom: 1px solid var(--border);
}

.attendus-table th:last-child { text-align: center; }

.attendu-row {
  border-bottom: 1px solid #f0eee8;
  transition: background var(--transition);
}

.attendu-row:last-child { border-bottom: none; }
.attendu-row:hover { background: #faf8f5; }

.attendu-row.acquis { opacity: 0.5; }
.attendu-row.acquis .attendu-text { color: var(--ink3); }

.attendu-row td { padding: 10px 18px; vertical-align: middle; }

.sem-badge {
  font-size: 10px;
  font-weight: 600;
  color: var(--ink3);
  background: var(--bg);
  padding: 2px 7px;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

.attendu-text { font-size: 13px; color: var(--ink); line-height: 1.5; }

/* ── SCORE BUTTONS ── */
.score-group {
  display: flex; gap: 4px;
  justify-content: center;
  white-space: nowrap;
}

.sbtn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--ink3);
  font-family: 'DM Sans', sans-serif;
  transition: all var(--transition);
  display: flex; align-items: center; justify-content: center;
}

.sbtn:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.12); }
.sbtn:active { transform: translateY(0); }

.sbtn.s0.active { background: #fde8e8; border-color: #c97070; color: var(--red); }
.sbtn.s1.active { background: #fff3cc; border-color: #d4a840; color: var(--amber); }
.sbtn.s2.active { background: #d6f0d6; border-color: #5ca05c; color: var(--green); }

/* ── PROGRESS BAR ── */
.prog-wrap { display: flex; align-items: center; gap: 10px; min-width: 120px; }
.prog-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
.prog-fill { height: 100%; border-radius: 2px; background: rgba(255,255,255,0.7); transition: width 0.4s ease; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--ink); color: #f4f2ee;
  padding: 10px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  transform: translateY(80px); opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none; z-index: 999;
}

.toast.show { transform: translateY(0); opacity: 1; }

/* ── SAVING INDICATOR ── */
.saving-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold);
  animation: pulse 1s ease infinite;
  display: none;
}

.saving-dot.visible { display: block; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { height: auto; position: relative; }
  .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 8px; }
  .content { padding: 16px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Bulletin P4</div>
      <div class="sidebar-sub">Fédération Wallonie-Bruxelles</div>
    </div>
    <div class="sidebar-label">Élèves</div>
    <div id="eleve-list"></div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-name" id="topbar-name">Sélectionne un élève</div>
      <div class="saving-dot" id="saving-dot"></div>
      <div class="topbar-score" id="topbar-score" style="display:none"></div>
      <div class="filter-pills" id="filter-pills" style="display:none">
        <button class="pill active" data-f="all">Tout</button>
        <button class="pill" data-f="non-acquis">Non acquis</button>
        <button class="pill" data-f="acquis">Acquis</button>
      </div>
      <button class="btn-export" id="btn-export" style="display:none" onclick="exporterCSV()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exporter CSV
      </button>
    </div>

    <div class="content" id="content">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <h3>Aucun élève sélectionné</h3>
        <p>Choisis un élève dans le panneau gauche<br>pour saisir son évaluation.</p>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzb4_3ELKJGuDHgmxTK53WjM1QnvPvV1jYvnHnHABcvPYmKRdKq7-jkQ313FWF6TKHj/exec";

const BULLETIN = [

// Générer des IDs uniques
let globalId = 0;
BULLETIN.forEach(d => d.champs.forEach(c => c.attendus.forEach(a => { a.push('att_'+(++globalId)); })));

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let currentEleve = null;
let scores = {};       // { eleve: { att_id: 0|1|2 } }
let filter = 'all';
let openDomaines = {};
let openChamps = {};
let saveTimer = null;

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
function init() {
  renderSidebar();
  setupFilters();
  loadAllFromStorage();
}

function renderSidebar() {
  const list = document.getElementById('eleve-list');
  list.innerHTML = '';
  ELEVES.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'eleve-btn';
    btn.dataset.eleve = e;
    btn.innerHTML = `<span class="eleve-dot"></span><span>${e}</span><span class="eleve-progress-mini" id="mini-${sanitizeId(e)}"></span>`;
    btn.onclick = () => selectEleve(e);
    list.appendChild(btn);
  });
}

function sanitizeId(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

function setupFilters() {
  document.querySelectorAll('.pill').forEach(p => {
    p.onclick = () => {
      filter = p.dataset.f;
      document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      renderBulletin();
    };
  });
}

// ══════════════════════════════════════════════════════════════
//  STORAGE LOCAL (cache instantané)
// ══════════════════════════════════════════════════════════════
function loadAllFromStorage() {
  try {
    const raw = localStorage.getItem('bulletin_p4_v2');
    if (raw) scores = JSON.parse(raw);
  } catch(e) {}
  updateAllMinis();
}

function saveToStorage() {
  try { localStorage.setItem('bulletin_p4_v2', JSON.stringify(scores)); } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
//  GOOGLE SHEETS API
// ══════════════════════════════════════════════════════════════
async function loadFromSheet(eleve) {
  try {
    const url = APPS_SCRIPT_URL + '?action=get&eleve=' + encodeURIComponent(eleve);
    const resp = await fetch(url);
    const data = await resp.json();
    if (data && data.scores) {
      if (!scores[eleve]) scores[eleve] = {};
      Object.assign(scores[eleve], data.scores);
      saveToStorage();
      renderBulletin();
      updateMini(eleve);
    }
  } catch(e) {
    // Fonctionne en local si Apps Script non configuré
    console.warn('Sheet non accessible, mode local activé', e);
  }
}

async function saveToSheet(eleve) {
  showSaving(true);
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'set', eleve, scores: scores[eleve] || {} })
    });
    showToast('Sauvegardé ✓');
  } catch(e) {
    showToast('Sauvegardé localement');
  }
  showSaving(false);
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { if (currentEleve) saveToSheet(currentEleve); }, 1200);
}

// ══════════════════════════════════════════════════════════════
//  ELÈVE SELECTION
// ══════════════════════════════════════════════════════════════
function selectEleve(eleve) {
  currentEleve = eleve;
  document.querySelectorAll('.eleve-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.eleve === eleve);
  });
  document.getElementById('topbar-name').textContent = eleve;
  document.getElementById('topbar-score').style.display = '';
  document.getElementById('filter-pills').style.display = '';
  document.getElementById('btn-export').style.display = '';
  renderBulletin();
  loadFromSheet(eleve);  // charge depuis la sheet en arrière-plan
}

// ══════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════
function renderBulletin() {
  if (!currentEleve) return;
  const content = document.getElementById('content');
  content.innerHTML = '';

  BULLETIN.forEach((dom, di) => {
    const block = renderDomaine(dom, di);
    if (block) content.appendChild(block);
  });

  updateTopbarScore();
  updateMini(currentEleve);
}

function renderDomaine(dom, di) {
  const isOpen = openDomaines[di] !== false;
  const stats = getDomStats(dom);

  const wrap = document.createElement('div');
  wrap.className = 'domaine-block';

  const hdr = document.createElement('div');
  hdr.className = `domaine-header d${di}`;
  const pct = Math.round((stats.pts / (stats.total * 2)) * 100) || 0;
  hdr.innerHTML = `
    <span class="domaine-chevron ${isOpen?'open':''}">▶</span>
    <span class="domaine-title">${dom.domaine}</span>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="domaine-stats">${stats.pts}/${stats.total*2} pts</span>
    </div>`;
  hdr.onclick = () => { openDomaines[di] = !isOpen; renderBulletin(); };
  wrap.appendChild(hdr);

  if (isOpen) {
    const body = document.createElement('div');
    body.className = 'domaine-body';
    dom.champs.forEach((ch, ci) => {
      const champEl = renderChamp(ch, `${di}_${ci}`);
      if (champEl) body.appendChild(champEl);
    });
    wrap.appendChild(body);
  }
  return wrap;
}

function renderChamp(ch, key) {
  const isOpen = openChamps[key] !== false;
  const acq = ch.attendus.filter(a => getScore(a[2]) === 2).length;

  const wrap = document.createElement('div');
  wrap.className = 'champ-block';

  const hdr = document.createElement('div');
  hdr.className = 'champ-header';
  hdr.innerHTML = `
    <span class="champ-chevron ${isOpen?'open':''}">▶</span>
    <span class="champ-title">${ch.champ}</span>
    <span class="champ-stats">${acq}/${ch.attendus.length} acquis</span>`;
  hdr.onclick = () => { openChamps[key] = !isOpen; renderBulletin(); };
  wrap.appendChild(hdr);

  if (!isOpen) return wrap;

  const table = document.createElement('table');
  table.className = 'attendus-table';
  table.innerHTML = `<thead><tr>
    <th style="width:56px">Sem.</th>
    <th>Attendu</th>
    <th style="width:130px;text-align:center">Évaluation</th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');

  let hasVisible = false;
  ch.attendus.forEach(a => {
    const [sem, texte, id] = a;
    const sc = getScore(id);
    const isAcquis = sc === 2;
    if (filter === 'acquis' && !isAcquis) return;
    if (filter === 'non-acquis' && isAcquis) return;
    hasVisible = true;

    const tr = document.createElement('tr');
    tr.className = 'attendu-row' + (isAcquis ? ' acquis' : '');
    tr.innerHTML = `
      <td><span class="sem-badge">${sem}</span></td>
      <td><span class="attendu-text">${texte}</span></td>
      <td>
        <div class="score-group">
          <button class="sbtn s0 ${sc===0?'active':''}" onclick="setScore('${id}',0)" title="Non acquis">0</button>
          <button class="sbtn s1 ${sc===1?'active':''}" onclick="setScore('${id}',1)" title="En voie">1</button>
          <button class="sbtn s2 ${sc===2?'active':''}" onclick="setScore('${id}',2)" title="Acquis">2</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });

  if (!hasVisible) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="3" style="text-align:center;padding:14px;font-size:13px;color:var(--ink3)">Aucun attendu dans ce filtre.</td>`;
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

// ══════════════════════════════════════════════════════════════
//  SCORE
// ══════════════════════════════════════════════════════════════
function getScore(id) {
  return scores[currentEleve]?.[id] ?? -1;
}

function setScore(id, val) {
  if (!currentEleve) return;
  if (!scores[currentEleve]) scores[currentEleve] = {};
  if (scores[currentEleve][id] === val) {
    delete scores[currentEleve][id];
  } else {
    scores[currentEleve][id] = val;
  }
  saveToStorage();
  scheduleSave();
  renderBulletin();
}

function getDomStats(dom) {
  let pts = 0, total = 0;
  dom.champs.forEach(ch => ch.attendus.forEach(a => {
    total++;
    const s = getScore(a[2]);
    if (s >= 0) pts += s;
  }));
  return { pts, total };
}

function getAllStats() {
  let pts = 0, total = 0;
  BULLETIN.forEach(d => d.champs.forEach(c => c.attendus.forEach(a => {
    total++;
    const s = getScore(a[2]);
    if (s >= 0) pts += s;
  })));
  return { pts, max: total * 2, pct: Math.round((pts / (total * 2)) * 100) };
}

function updateTopbarScore() {
  const { pts, max, pct } = getAllStats();
  document.getElementById('topbar-score').innerHTML = `<strong>${pts}</strong> / ${max} pts — ${pct}%`;
}

function updateMini(eleve) {
  const el = document.getElementById('mini-' + sanitizeId(eleve));
  if (!el) return;
  const prev = currentEleve;
  currentEleve = eleve;
  const { pts, max } = getAllStats();
  currentEleve = prev;
  el.textContent = pts + '/' + max;
}

function updateAllMinis() {
  ELEVES.forEach(e => updateMini(e));
}

// ══════════════════════════════════════════════════════════════
//  EXPORT CSV
// ══════════════════════════════════════════════════════════════
function exporterCSV() {
  if (!currentEleve) return;
  const rows = [['Prénom','Domaine','Champ','Semaine','Attendu','Score','Statut']];
  BULLETIN.forEach(d => d.champs.forEach(c => c.attendus.forEach(a => {
    const [sem, texte, id] = a;
    const sc = scores[currentEleve]?.[id];
    const statut = sc === 2 ? 'Acquis' : sc === 1 ? 'En voie' : sc === 0 ? 'Non acquis' : 'Non évalué';
    rows.push([currentEleve, d.domaine, c.champ, sem, texte, sc !== undefined ? sc : '', statut]);
  })));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bulletin_${currentEleve}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast('Export téléchargé ✓');
}

// ══════════════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showSaving(v) {
  document.getElementById('saving-dot').classList.toggle('visible', v);
}
