<title>Bulletin P4 — FWB</title>

<style>
:root {
  --bg:#f4f2ee; --surface:#fff; --ink:#1a1814; --ink2:#6b6660; --ink3:#a8a39e;

}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
.sidebar{background:var(--ink);color:#f4f2ee;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-header{padding:24px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-logo{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:3px;color:#f4f2ee;}
.sidebar-sub{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,242,238,.4);font-weight:500;}
.sidebar-label{padding:16px 18px 6px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,242,238,.35);font-weight:600;}
.eleve-btn{display:flex;align-items:center;gap:8px;padding:7px 18px;cursor:pointer;border:none;background:none;color:rgba(244,242,238,.65);width:100%;text-align:left;font-family:'DM Sans',sans-serif;font-size:13px;transition:all var(--tr);}
.eleve-btn:hover{background:rgba(255,255,255,.07);color:#f4f2ee;}
.eleve-btn.active{background:rgba(255,255,255,.12);color:#f4f2ee;font-weight:500;}
.eleve-btn.active .edot{background:var(--gold);}
.edot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);flex-shrink:0;transition:background var(--tr);}
.emini{margin-left:auto;font-size:10px;color:rgba(244,242,238,.35);font-variant-numeric:tabular-nums;}
.main{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.topbar-name{font-family:'DM Serif Display',serif;font-size:21px;color:var(--ink);flex:1;}
.tscore{font-size:12px;color:var(--ink2);background:var(--bg);padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-variant-numeric:tabular-nums;}
.tscore strong{color:var(--green);}
.pills{display:flex;gap:5px;}
.pill{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer;transition:all var(--tr);font-family:'DM Sans',sans-serif;}
.pill:hover{border-color:var(--green);color:var(--green);}
.pill.active{background:var(--ink);color:#f4f2ee;border-color:var(--ink);}
.btn-exp{display:flex;align-items:center;gap:5px;font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all var(--tr);font-weight:500;}
.btn-exp:hover{background:var(--ink);color:#f4f2ee;border-color:var(--ink);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1s ease infinite;display:none;}
.sdot.on{display:block;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:24px 28px;flex:1;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;color:var(--ink3);}
.empty h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink2);margin:12px 0 6px;}
.empty p{font-size:13px;}
.dblock{margin-bottom:24px;}
.dhdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;user-select:none;color:#fff;transition:filter var(--tr);}
.dhdr:hover{filter:brightness(1.08);}
.dhdr.d0{background:var(--d0);}
.dhdr.d1{background:var(--d1);}
.dhdr.d2{background:var(--d2);}
.dhdr.d3{background:var(--d3);}
.dtitle{font-family:'DM Serif Display',serif;font-size:15px;flex:1;}
.dstats{font-size:11px;opacity:.7;font-variant-numeric:tabular-nums;}
.dchev{font-size:10px;opacity:.6;transition:transform var(--tr);}
.dchev.open{transform:rotate(90deg);}
.dbody{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;background:var(--surface);}
.pw{display:flex;align-items:center;gap:8px;min-width:90px;}
.pb{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:2px;}
.pf{height:100%;border-radius:2px;background:rgba(255,255,255,.65);transition:width .4s;}
.cblock{border-top:1px solid var(--border);}
.cblock:first-child{border-top:none;}
.chdr{display:flex;align-items:center;gap:8px;padding:9px 16px;background:#faf9f7;cursor:pointer;user-select:none;transition:background var(--tr);}
.chdr:hover{background:#f2f0eb;}
.ctitle{font-size:12px;font-weight:600;color:var(--ink);flex:1;}
.cstats{font-size:10px;color:var(--ink3);}
.cchev{font-size:9px;color:var(--ink3);transition:transform var(--tr);}
.cchev.open{transform:rotate(90deg);}
.att-table{width:100%;border-collapse:collapse;}
.att-table th{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:7px 16px;text-align:left;background:#fdfcfb;border-bottom:1px solid var(--border);}
.att-table th:last-child{text-align:center;}
.arow{border-bottom:1px solid #f0eee8;transition:background var(--tr);}
.arow:last-child{border-bottom:none;}
.arow:hover{background:#faf8f5;}
.arow.acq{opacity:.45;}
.arow td{padding:9px 16px;vertical-align:middle;}
.sbadge{font-size:10px;font-weight:600;color:var(--ink3);background:var(--bg);padding:2px 6px;border-radius:4px;white-space:nowrap;}
.atext{font-size:12px;color:var(--ink);line-height:1.5;}
.sg{display:flex;gap:3px;justify-content:center;white-space:nowrap;}
.sbtn{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;color:var(--ink3);font-family:'DM Sans',sans-serif;transition:all var(--tr);display:flex;align-items:center;justify-content:center;}
.sbtn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.1);}
.sbtn.s0.on{background:#fde8e8;border-color:#c97070;color:var(--red);}
.sbtn.s1.on{background:#fff3cc;border-color:#d4a840;color:var(--amber);}
.sbtn.s2.on{background:#d6f0d6;border-color:#5ca05c;color:var(--green);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#f4f2ee;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:500;transform:translateY(60px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:760px){.app{grid-template-columns:1fr;}.sidebar{height:auto;position:relative;}.topbar{padding:8px 14px;flex-wrap:wrap;height:auto;gap:6px;}.content{padding:14px;}}
</style>
</head>

</div>
<div class="toast" id="toast"></div>

        champ: "Construire la citoyenneté dans l'égalité en dignité et en droits",
        attendus: [
          // À compléter selon les projets de citoyenneté menés en classe
        ]
      },
      {
        champ: "Construire sa pensée et ses croyances (cours philosophiques)",
        attendus: [
          // À compléter selon le cours philosophique suivi
        ]
      },
      {
        champ: "Apprendre à se connaître et à connaître les autres",
        attendus: [
          // À compléter selon les activités menées
        ]
      },
    ]
  },
];

// Filtrer les champs sans attendus pour l'affichage
// (ils apparaissent dans la structure mais ne génèrent pas de lignes vides)

// Générer IDs uniques
let gid = 0;
BULLETIN.forEach(d => d.champs.forEach(c => c.attendus.forEach(a => { a.push('a'+(++gid)); })));

// ── STATE ──────────────────────────────────────────────────────
let cur = null, scores = {}, filter = 'all', openD = {}, openC = {}, stimer = null;

function init() {
  try { const r = localStorage.getItem('bul_p4_v3'); if(r) scores = JSON.parse(r); } catch(e){}
  renderSidebar();
  document.querySelectorAll('.pill').forEach(p => {
    p.onclick = () => {
      filter = p.dataset.f;
      document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      renderBulletin();
    };
  });
  updateAllMinis();
}

function sid(s){ return s.replace(/[^a-zA-Z0-9]/g,'_'); }

function renderSidebar() {
  const list = document.getElementById('elist');
  list.innerHTML = '';
  ELEVES.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'eleve-btn'; btn.dataset.eleve = e;
    btn.innerHTML = `<span class="edot"></span><span>${e}</span><span class="emini" id="mini-${sid(e)}"></span>`;
    btn.onclick = () => selectEleve(e);
    list.appendChild(btn);
  });
}

async function selectEleve(e) {
  cur = e;
  document.querySelectorAll('.eleve-btn').forEach(b => b.classList.toggle('active', b.dataset.eleve===e));
  document.getElementById('tname').textContent = e;
  ['tscore','pills','bexp'].forEach(id => document.getElementById(id).style.display='');
  renderBulletin();
  try {
    const resp = await fetch(API + '?action=get&eleve=' + encodeURIComponent(e));
    const data = await resp.json();
    if (data && data.scores) {
      if (!scores[e]) scores[e] = {};
      Object.assign(scores[e], data.scores);
      saveLocal(); renderBulletin(); updateMini(e);
    }
  } catch(err) { console.warn('Mode local', err); }
}

function getScore(id){ return scores[cur]?.[id] ?? -1; }

function setScore(id, val) {
  if (!cur) return;
  if (!scores[cur]) scores[cur] = {};
  if (scores[cur][id] === val) delete scores[cur][id];
  else scores[cur][id] = val;
  saveLocal(); scheduleSave(); renderBulletin();
}

function saveLocal(){ try{ localStorage.setItem('bul_p4_v3', JSON.stringify(scores)); }catch(e){} }

function scheduleSave() {
  if (stimer) clearTimeout(stimer);
  stimer = setTimeout(async () => {
    if (!cur) return;
    document.getElementById('sdot').classList.add('on');
    try {
      await fetch(API, { method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'set', eleve:cur, scores:scores[cur]||{} })
      });
      showToast('Sauvegardé ✓');
    } catch(e){ showToast('Sauvegardé localement'); }
    document.getElementById('sdot').classList.remove('on');
  }, 1200);
}

function getDomStats(dom) {
  let pts=0, total=0;
  dom.champs.forEach(c => c.attendus.forEach(a => { total++; const s=getScore(a[2]); if(s>=0) pts+=s; }));
  return {pts, total};
}

function getAllStats() {
  let pts=0, total=0;
  BULLETIN.forEach(d => d.champs.forEach(c => c.attendus.forEach(a => { total++; const s=getScore(a[2]); if(s>=0) pts+=s; })));
  return {pts, max:total*2, pct:Math.round((pts/(total*2))*100)};
}

function updateMini(e) {
  const el = document.getElementById('mini-'+sid(e)); if(!el) return;
  const prev=cur; cur=e;
  const {pts,max}=getAllStats(); cur=prev;
  el.textContent = pts+'/'+max;
}
function updateAllMinis(){ ELEVES.forEach(e=>updateMini(e)); }

function renderBulletin() {
  if (!cur) return;
  const content = document.getElementById('content');
  content.innerHTML = '';
  BULLETIN.forEach((dom,di) => {
    // Ne pas afficher les domaines entièrement vides
    const hasAny = dom.champs.some(c => c.attendus.length > 0);
    if (!hasAny) return;
    content.appendChild(renderDomaine(dom, di));
  });
  const {pts,max,pct} = getAllStats();
  document.getElementById('tscore').innerHTML = `<strong>${pts}</strong> / ${max} pts — ${pct}%`;
  updateMini(cur);
}

function renderDomaine(dom, di) {
  const isOpen = openD[di] !== false;
  const {pts,total} = getDomStats(dom);
  const pct = total>0 ? Math.round((pts/(total*2))*100) : 0;
  const wrap = document.createElement('div'); wrap.className='dblock';
  const hdr = document.createElement('div'); hdr.className=`dhdr d${di % 4}`;
  hdr.innerHTML = `<span class="dchev ${isOpen?'open':''}">▶</span>
    <span class="dtitle">${dom.domaine}</span>
    <div class="pw"><div class="pb"><div class="pf" style="width:${pct}%"></div></div>
    <span class="dstats">${pts}/${total*2}</span></div>`;
  hdr.onclick = () => { openD[di]=!isOpen; renderBulletin(); };
  wrap.appendChild(hdr);
  if (isOpen) {
    const body = document.createElement('div'); body.className='dbody';
    dom.champs.forEach((ch,ci) => {
      if (ch.attendus.length === 0) return; // masquer champs vides
      body.appendChild(renderChamp(ch, `${di}_${ci}`));
    });
    wrap.appendChild(body);
  }
  return wrap;
}

function renderChamp(ch, key) {
  const isOpen = openC[key] !== false;
  const acq = ch.attendus.filter(a => getScore(a[2])===2).length;
  const wrap = document.createElement('div'); wrap.className='cblock';
  const hdr = document.createElement('div'); hdr.className='chdr';
  hdr.innerHTML = `<span class="cchev ${isOpen?'open':''}">▶</span>
    <span class="ctitle">${ch.champ}</span>
    <span class="cstats">${acq}/${ch.attendus.length} acquis</span>`;
  hdr.onclick = () => { openC[key]=!isOpen; renderBulletin(); };
  wrap.appendChild(hdr);
  if (!isOpen) return wrap;
  const table = document.createElement('table'); table.className='att-table';
  table.innerHTML = `<thead><tr><th style="width:52px">Sem.</th><th>Attendu</th><th style="width:120px;text-align:center">Évaluation</th></tr></thead>`;
  const tbody = document.createElement('tbody');
  let hasRows = false;
  ch.attendus.forEach(a => {
    const [sem,texte,id] = a;
    const sc = getScore(id);
    const isAcq = sc===2;
    if (filter==='acquis' && !isAcq) return;
    if (filter==='non-acquis' && isAcq) return;
    hasRows = true;
    const tr = document.createElement('tr');
    tr.className = 'arow' + (isAcq?' acq':'');
    tr.innerHTML = `<td><span class="sbadge">${sem}</span></td>
      <td><span class="atext">${texte}</span></td>
      <td><div class="sg">
        <button class="sbtn s0 ${sc===0?'on':''}" onclick="setScore('${id}',0)">0</button>
        <button class="sbtn s1 ${sc===1?'on':''}" onclick="setScore('${id}',1)">1</button>
        <button class="sbtn s2 ${sc===2?'on':''}" onclick="setScore('${id}',2)">2</button>
      </div></td>`;
    tbody.appendChild(tr);
  });
  if (!hasRows) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="3" style="text-align:center;padding:12px;font-size:12px;color:var(--ink3)">Aucun attendu dans ce filtre.</td>`;
    tbody.appendChild(tr);
  }
  table.appendChild(tbody); wrap.appendChild(table);
  return wrap;
}

function exportCSV() {
  if (!cur) return;
  const rows = [['Prénom','Domaine','Champ','Semaine','Attendu','Score','Statut']];
  BULLETIN.forEach(d => d.champs.forEach(c => c.attendus.forEach(a => {
    const [sem,texte,id] = a;
    const sc = scores[cur]?.[id];
    const statut = sc===2?'Acquis':sc===1?'En voie':sc===0?'Non acquis':'Non évalué';
    rows.push([cur, d.domaine, c.champ, sem, texte, sc!==undefined?sc:'', statut]);
  })));
  const csv = rows.map(r => r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`bulletin_${cur}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast('Export téléchargé ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

init();
</script>
