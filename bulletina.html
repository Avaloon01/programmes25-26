<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulletin P4 — FWB</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f2ee;--sur:#fff;--ink:#1a1814;--ink2:#6b6660;--ink3:#a8a39e;--brd:#e0ddd6;--r:12px;--gold:#c8973a;--red:#8b3a3a;--amb:#9a6e1a;--grn:#2d5a3d;--d0:#2d5a3d;--d1:#3a4a6b;--d2:#6b3a2d;--d3:#4a3a6b;--tr:.2s cubic-bezier(.4,0,.2,1);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
.sb{background:var(--ink);color:#f4f2ee;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-hdr{padding:24px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:3px;color:#f4f2ee;}
.sb-sub{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,242,238,.4);font-weight:500;}
.sb-lbl{padding:16px 18px 6px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,242,238,.35);font-weight:600;}
.ebtn{display:flex;align-items:center;gap:8px;padding:7px 18px;cursor:pointer;border:none;background:none;color:rgba(244,242,238,.65);width:100%;text-align:left;font-family:'DM Sans',sans-serif;font-size:13px;transition:all var(--tr);}
.ebtn:hover{background:rgba(255,255,255,.07);color:#f4f2ee;}
.ebtn.on{background:rgba(255,255,255,.12);color:#f4f2ee;font-weight:500;}
.ebtn.on .edot{background:var(--gold);}
.edot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);flex-shrink:0;transition:background var(--tr);}
.emn{margin-left:auto;font-size:10px;color:rgba(244,242,238,.35);font-variant-numeric:tabular-nums;}
.main{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--sur);border-bottom:1px solid var(--brd);padding:0 28px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.tname{font-family:'DM Serif Display',serif;font-size:21px;color:var(--ink);flex:1;}
.tsco{font-size:12px;color:var(--ink2);background:var(--bg);padding:5px 12px;border-radius:20px;border:1px solid var(--brd);}
.tsco strong{color:var(--grn);}
.pills{display:flex;gap:5px;}
.pill{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--brd);background:var(--sur);color:var(--ink2);cursor:pointer;transition:all var(--tr);font-family:'DM Sans',sans-serif;}
.pill:hover{border-color:var(--grn);color:var(--grn);}
.pill.on{background:var(--ink);color:#f4f2ee;border-color:var(--ink);}
.bexp{display:flex;align-items:center;gap:5px;font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--brd);background:var(--sur);color:var(--ink2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all var(--tr);font-weight:500;}
.bexp:hover{background:var(--ink);color:#f4f2ee;border-color:var(--ink);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1s ease infinite;display:none;}
.sdot.on{display:block;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.cnt{padding:24px 28px;flex:1;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;color:var(--ink3);}
.empty h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink2);margin:12px 0 6px;}
.empty p{font-size:13px;}
.dblk{margin-bottom:24px;}
.dhdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;color:#fff;transition:filter var(--tr);}
.dhdr:hover{filter:brightness(1.08);}
.dhdr.d0{background:var(--d0);}
.dhdr.d1{background:var(--d1);}
.dhdr.d2{background:var(--d2);}
.dhdr.d3{background:var(--d3);}
.dtit{font-family:'DM Serif Display',serif;font-size:15px;flex:1;}
.dsta{font-size:11px;opacity:.7;font-variant-numeric:tabular-nums;}
.dchv{font-size:10px;opacity:.6;transition:transform var(--tr);}
.dchv.op{transform:rotate(90deg);}
.dbdy{border:1px solid var(--brd);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;background:var(--sur);}
.pw{display:flex;align-items:center;gap:8px;min-width:90px;}
.pb{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:2px;}
.pf{height:100%;border-radius:2px;background:rgba(255,255,255,.65);transition:width .4s;}
.cblk{border-top:1px solid var(--brd);}
.cblk:first-child{border-top:none;}
.chdr{display:flex;align-items:center;gap:8px;padding:9px 16px;background:#faf9f7;cursor:pointer;user-select:none;transition:background var(--tr);}
.chdr:hover{background:#f2f0eb;}
.ctit{font-size:12px;font-weight:600;color:var(--ink);flex:1;}
.csta{font-size:10px;color:var(--ink3);}
.cchv{font-size:9px;color:var(--ink3);transition:transform var(--tr);}
.cchv.op{transform:rotate(90deg);}
.att{width:100%;border-collapse:collapse;}
.att th{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:7px 16px;text-align:left;background:#fdfcfb;border-bottom:1px solid var(--brd);}
.att th:last-child{text-align:center;}
.arow{border-bottom:1px solid #f0eee8;transition:background var(--tr);}
.arow:last-child{border-bottom:none;}
.arow:hover{background:#faf8f5;}
.arow.acq{opacity:.45;}
.arow td{padding:9px 16px;vertical-align:middle;}
.sbdg{font-size:10px;font-weight:600;color:var(--ink3);background:var(--bg);padding:2px 6px;border-radius:4px;white-space:nowrap;}
.atxt{font-size:12px;color:var(--ink);line-height:1.5;}
.sg{display:flex;gap:3px;justify-content:center;white-space:nowrap;}
.sbt{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--brd);background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;color:var(--ink3);font-family:'DM Sans',sans-serif;transition:all var(--tr);display:flex;align-items:center;justify-content:center;}
.sbt:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.1);}
.sbt.s0.on{background:#fde8e8;border-color:#c97070;color:var(--red);}
.sbt.s1.on{background:#fff3cc;border-color:#d4a840;color:var(--amb);}
.sbt.s2.on{background:#d6f0d6;border-color:#5ca05c;color:var(--grn);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#f4f2ee;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:500;transform:translateY(60px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:999;}
.toast.on{transform:translateY(0);opacity:1;}
@media(max-width:760px){.app{grid-template-columns:1fr;}.sb{height:auto;position:relative;}.topbar{padding:8px 14px;flex-wrap:wrap;height:auto;gap:6px;}.cnt{padding:14px;}}
</style>
</head>
<body>
<div class="app">
  <aside class="sb">
    <div class="sb-hdr">
      <div class="sb-logo">Bulletin P4</div>

      </button>

  </main>
</div>
<div class="toast" id="toast"></div>

let cur = null, scores = {}, filter = 'all', openD = {}, openC = {}, stimer = null;

function init() {
  try { const r = localStorage.getItem('bul_p4_v4'); if (r) scores = JSON.parse(r); } catch(e) {}

  document.querySelectorAll('.pill').forEach(p => {
    p.onclick = () => {

  updateAllMinis();
}

function sid(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

function renderSidebar() {
  const list = document.getElementById('elist');
  list.innerHTML = '';
  ELEVES.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'ebtn'; btn.dataset.e = e;
    btn.innerHTML = `<span class="edot"></span><span>${e}</span><span class="emn" id="mn-${sid(e)}"></span>`;
    btn.onclick = () => selectEleve(e);
    list.appendChild(btn);
  });
}

async function selectEleve(e) {
  cur = e;
  document.querySelectorAll('.ebtn').forEach(b => b.classList.toggle('on', b.dataset.e === e));
  document.getElementById('tname').textContent = e;
  ['tsco','pills','bexp'].forEach(id => document.getElementById(id).style.display = '');
  renderBulletin();
  try {
    const resp = await fetch(API + '?action=get&eleve=' + encodeURIComponent(e));
    const data = await resp.json();
    if (data && data.scores) {
      if (!scores[e]) scores[e] = {};
      Object.assign(scores[e], data.scores);
      saveLocal(); renderBulletin(); updateMini(e);
    }
  } catch(err) { console.warn('Mode local activé', err); }
}

function getScore(id) { return scores[cur]?.[id] ?? -1; }

function setScore(id, val) {
  if (!cur) return;
  if (!scores[cur]) scores[cur] = {};
  if (scores[cur][id] === val) delete scores[cur][id];
  else scores[cur][id] = val;
  saveLocal(); scheduleSave(); renderBulletin();
}

function saveLocal() {
  try { localStorage.setItem('bul_p4_v4', JSON.stringify(scores)); } catch(e) {}
}

function scheduleSave() {
  if (stimer) clearTimeout(stimer);
  stimer = setTimeout(async () => {
    if (!cur) return;
    document.getElementById('sdot').classList.add('on');
    try {
      await fetch(API, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'set', eleve: cur, scores: scores[cur] || {} })
      });
      showToast('Sauvegardé ✓');
    } catch(e) { showToast('Sauvegardé localement'); }
    document.getElementById('sdot').classList.remove('on');
  }, 1200);
}

function getDomStats(dom) {
  let pts = 0, total = 0;
  dom.champs.forEach(c => c.attendus.forEach(a => {
    total++;
    const s = getScore(a[2]);
    if (s >= 0) pts += s;
  }));
  return { pts, total };
}

function getAllStats() {
  let pts = 0, total = 0;
  BULLETIN.forEach(d => d.champs.forEach(c => c.attendus.forEach(a => {
    total++;
    const s = getScore(a[2]);
    if (s >= 0) pts += s;
  })));
  return { pts, max: total * 2, pct: Math.round((pts / (total * 2)) * 100) || 0 };
}

function updateMini(e) {
  const el = document.getElementById('mn-' + sid(e)); if (!el) return;
  const prev = cur; cur = e;
  const { pts, max } = getAllStats();
  cur = prev;
  el.textContent = pts + '/' + max;
}

function updateAllMinis() { ELEVES.forEach(e => updateMini(e)); }

function renderBulletin() {
  if (!cur) return;
  const cnt = document.getElementById('cnt');
  cnt.innerHTML = '';
  BULLETIN.forEach((dom, di) => {
    const hasAny = dom.champs.some(c => c.attendus.length > 0);
    if (!hasAny) return;
    cnt.appendChild(renderDom(dom, di));
  });
  const { pts, max, pct } = getAllStats();
  document.getElementById('tsco').innerHTML = `<strong>${pts}</strong> / ${max} pts — ${pct}%`;
  updateMini(cur);
}

function renderDom(dom, di) {
  const isOpen = openD[di] !== false;
  const { pts, total } = getDomStats(dom);
  const pct = total > 0 ? Math.round((pts / (total * 2)) * 100) : 0;
  const wrap = document.createElement('div'); wrap.className = 'dblk';
  const hdr = document.createElement('div'); hdr.className = 'dhdr d' + (di % 4);
  hdr.innerHTML = `<span class="dchv ${isOpen ? 'op' : ''}">▶</span>
    <span class="dtit">${dom.domaine}</span>
    <div class="pw"><div class="pb"><div class="pf" style="width:${pct}%"></div></div>
    <span class="dsta">${pts}/${total * 2}</span></div>`;
  hdr.onclick = () => { openD[di] = !isOpen; renderBulletin(); };
  wrap.appendChild(hdr);
  if (isOpen) {
    const body = document.createElement('div'); body.className = 'dbdy';
    dom.champs.forEach((ch, ci) => {
      if (ch.attendus.length === 0) return;
      body.appendChild(renderChamp(ch, di + '_' + ci));
    });
    wrap.appendChild(body);
  }
  return wrap;
}

function renderChamp(ch, key) {
  const isOpen = openC[key] !== false;
  const acq = ch.attendus.filter(a => getScore(a[2]) === 2).length;
  const wrap = document.createElement('div'); wrap.className = 'cblk';
  const hdr = document.createElement('div'); hdr.className = 'chdr';
  hdr.innerHTML = `<span class="cchv ${isOpen ? 'op' : ''}">▶</span>
    <span class="ctit">${ch.champ}</span>
    <span class="csta">${acq}/${ch.attendus.length} acquis</span>`;
  hdr.onclick = () => { openC[key] = !isOpen; renderBulletin(); };
  wrap.appendChild(hdr);
  if (!isOpen) return wrap;

  const table = document.createElement('table'); table.className = 'att';
  table.innerHTML = `<thead><tr>
    <th style="width:52px">Sem.</th>
    <th>Attendu</th>
    <th style="width:120px;text-align:center">Évaluation</th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');
  let hasRows = false;

  ch.attendus.forEach(a => {
    const sem = a[0], texte = a[1], id = a[2];
    const sc = getScore(id);
    const isAcq = sc === 2;
    if (filter === 'acq' && !isAcq) return;
    if (filter === 'na' && isAcq) return;
    hasRows = true;
    const tr = document.createElement('tr');
    tr.className = 'arow' + (isAcq ? ' acq' : '');
    tr.innerHTML = `
      <td><span class="sbdg">${sem}</span></td>
      <td><span class="atxt">${texte}</span></td>
      <td><div class="sg">
        <button class="sbt s0 ${sc===0?'on':''}" onclick="setScore('${id}',0)" title="Non acquis">0</button>
        <button class="sbt s1 ${sc===1?'on':''}" onclick="setScore('${id}',1)" title="En voie">1</button>
        <button class="sbt s2 ${sc===2?'on':''}" onclick="setScore('${id}',2)" title="Acquis">2</button>
      </div></td>`;
    tbody.appendChild(tr);
  });

  if (!hasRows) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="3" style="text-align:center;padding:12px;font-size:12px;color:var(--ink3)">Aucun attendu dans ce filtre.</td>`;
    tbody.appendChild(tr);
  }
  table.appendChild(tbody); wrap.appendChild(table);
  return wrap;
}

function exportCSV() {
  if (!cur) return;
  const rows = [['Prénom','Domaine','Champ','Semaine','Attendu','Score','Statut']];
  BULLETIN.forEach(d => d.champs.forEach(c => c.attendus.forEach(a => {
    const sc = scores[cur]?.[a[2]];
    const statut = sc===2?'Acquis':sc===1?'En voie':sc===0?'Non acquis':'Non évalué';
    rows.push([cur, d.domaine, c.champ, a[0], a[1], sc!==undefined?sc:'', statut]);
  })));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`bulletin_${cur}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast('Export téléchargé ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2000);
}

init();
</script>
</body>
</html>
